<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neues Passwort — StudyRace</title>
<link rel="stylesheet" href="/site.css">
<link rel="manifest" href="/manifest.json">
</head>
<body>

<nav class="top">
  <div class="nav-inner">
    <a href="/" class="logo"><span class="logo-flag"></span>StudyRace</a>
  </div>
</nav>

<section style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:60px 20px;">
  <div style="max-width:440px;width:100%;">
    <div class="section-eyebrow">Neues Passwort</div>
    <h1 class="serif" style="font-size:36px;font-weight:500;letter-spacing:-0.025em;margin-bottom:14px;">Passwort <em style="color:var(--emerald);font-style:italic;">festlegen</em></h1>
    <p style="color:var(--ink-soft);line-height:1.6;margin-bottom:28px;">Wähle ein neues Passwort. Mindestens 8 Zeichen, mit Buchstabe und Zahl.</p>

    <form id="reset-form" onsubmit="return submitReset(event)" style="display:flex;flex-direction:column;gap:14px;">
      <div>
        <label style="display:block;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:6px;">Neues Passwort</label>
        <input type="password" id="new_password" required minlength="8" placeholder="Mind. 8 Zeichen"
               style="width:100%;padding:12px 16px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:15px;background:var(--cream-2);">
      </div>
      <div>
        <label style="display:block;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:6px;">Wiederholen</label>
        <input type="password" id="confirm_password" required minlength="8" placeholder="Nochmal eingeben"
               style="width:100%;padding:12px 16px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:15px;background:var(--cream-2);">
      </div>
      <div id="form-error" style="display:none;color:var(--terra);font-size:13px;"></div>
      <button type="submit" class="btn btn-emerald btn-lg" style="justify-content:center;">Passwort speichern →</button>
    </form>
  </div>
</section>

<script>
const params = new URLSearchParams(location.search);
const token = params.get('token') || '';
if (!token) {
  document.getElementById('form-error').textContent = 'Kein Token in der URL — bitte den Link aus der E-Mail nutzen.';
  document.getElementById('form-error').style.display = 'block';
  document.getElementById('reset-form').style.display = 'none';
}

async function submitReset(e) {
  e.preventDefault();
  const pw = document.getElementById('new_password').value;
  const conf = document.getElementById('confirm_password').value;
  const err = document.getElementById('form-error');
  err.style.display = 'none';
  if (pw !== conf) {
    err.textContent = 'Die Passwörter stimmen nicht überein.';
    err.style.display = 'block';
    return false;
  }
  try {
    const r = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ token, new_password: pw }),
    });
    const data = await r.json();
    if (data.ok) {
      alert('Passwort wurde geändert. Du wirst zum Login weitergeleitet.');
      window.location.href = '/login';
    } else {
      err.textContent = data.error || 'Fehler.';
      err.style.display = 'block';
    }
  } catch (e) {
    err.textContent = 'Verbindungsfehler.';
    err.style.display = 'block';
  }
  return false;
}
</script>
</body>
</html>
