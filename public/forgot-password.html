<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passwort zurücksetzen — StudyRace</title>
<link rel="stylesheet" href="/site.css">
<link rel="manifest" href="/manifest.json">
</head>
<body>

<nav class="top">
  <div class="nav-inner">
    <a href="/" class="logo"><span class="logo-flag"></span>StudyRace</a>
    <div class="nav-cta">
      <a href="/login" class="btn btn-ghost">Zurück zum Login</a>
    </div>
  </div>
</nav>

<section style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:60px 20px;">
  <div style="max-width:440px;width:100%;">
    <div class="section-eyebrow">Konto-Wiederherstellung</div>
    <h1 class="serif" style="font-size:36px;font-weight:500;letter-spacing:-0.025em;margin-bottom:14px;">Passwort <em style="color:var(--emerald);font-style:italic;">vergessen</em>?</h1>
    <p style="color:var(--ink-soft);line-height:1.6;margin-bottom:28px;">Gib deine E-Mail ein — wir schicken dir einen Link zum Zurücksetzen.</p>

    <form id="reset-form" onsubmit="return submitForgot(event)" style="display:flex;flex-direction:column;gap:14px;">
      <div>
        <label style="display:block;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:6px;">E-Mail</label>
        <input type="email" id="email" required placeholder="name@beispiel.de"
               style="width:100%;padding:12px 16px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:15px;background:var(--cream-2);">
      </div>
      <div id="form-error" style="display:none;color:var(--terra);font-size:13px;"></div>
      <div id="form-success" style="display:none;padding:14px;background:var(--emerald-tint);color:var(--emerald-2);border-radius:8px;font-size:14px;line-height:1.5;"></div>
      <button type="submit" class="btn btn-emerald btn-lg" style="justify-content:center;">Link senden →</button>
    </form>
    <div style="margin-top:18px;text-align:center;">
      <a href="/login" style="color:var(--ink-mute);font-size:13px;">← Zurück zum Login</a>
    </div>
  </div>
</section>

<script>
async function submitForgot(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const err = document.getElementById('form-error');
  const ok = document.getElementById('form-success');
  err.style.display = 'none';
  try {
    const r = await fetch('/api/auth/request-password-reset', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email }),
    });
    const data = await r.json();
    if (data.ok) {
      ok.innerHTML = '<strong>Falls ein Konto mit dieser E-Mail existiert</strong>, haben wir dir einen Link geschickt. Bitte prüfe dein Postfach (und Spam-Ordner).';
      ok.style.display = 'block';
      document.getElementById('reset-form').reset();
    } else {
      err.textContent = data.error || 'Fehler.';
      err.style.display = 'block';
    }
  } catch (e) {
    err.textContent = 'Verbindungsfehler.';
    err.style.display = 'block';
  }
  return false;
}
</script>
</body>
</html>
